[tool.ruff]
target-version = "py312"
line-length = 88
src = ["app", "src", "tests"]
extend-exclude = ["notebooks"]

[tool.ruff.lint]
select = [
    "B",   # flake8-bugbear checks for common bug patterns
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # import sorting
    "UP",  # pyupgrade
]
ignore = [
    "E501", # Long embedded HTML/Markdown template strings are handled by the formatter where practical.
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
